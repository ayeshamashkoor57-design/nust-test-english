<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUST NET Synonym Practice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .question-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #dcdde1;
            padding: 14px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 1em;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .option-btn:hover {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }
        .option-btn.correct {
            background-color: #2ecc71 !important;
            color: white !important;
            border-color: #2ecc71 !important;
        }
        .option-btn.wrong {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #e74c3c !important;
        }
        .disabled {
            pointer-events: none;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>NUST NET Synonym Practice</h1>
    <div id="quiz"></div>

    <script>
        const quizData = [
            {
                q: "What is the synonym of ABERRATION?",
                options: ["Regularity", "Conformity", "Deviation", "Intensification"],
                correct: 2
            },
            {
                q: "What is the synonym of CAPRICIOUS?",
                options: ["Fickle", "Steadfast", "Melancholic", "Sagacious"],
                correct: 0
            },
            {
                q: "What is the synonym of EPHEMERAL?",
                options: ["Eternal", "Short-lived", "Monotonous", "Resilient"],
                correct: 1
            },
            {
                q: "What is the synonym of LOQUACIOUS?",
                options: ["Taciturn", "Garrulous", "Reticent", "Diffident"],
                correct: 1
            },
            {
                q: "What is the synonym of MITIGATE?",
                options: ["Aggravate", "Alleviate", "Provoke", "Enhance"],
                correct: 1
            }
        ];

        const quizContainer = document.getElementById('quiz');

        function loadQuiz() {
            quizData.forEach((data, qIndex) => {
                const qBox = document.createElement('div');
                qBox.className = 'question-box';
                
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `Q${qIndex + 1}. ${data.q}`;
                qBox.appendChild(qText);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                data.options.forEach((option, oIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = option;
                    
                    btn.onclick = function() {
                        if (oIndex === data.correct) {
                            btn.classList.add('correct');
                        } else {
                            btn.classList.add('wrong');
                            optionsGrid.children[data.correct].classList.add('correct');
                        }
                        Array.from(optionsGrid.children).forEach(b => b.classList.add('disabled'));
                    };
                    
                    optionsGrid.appendChild(btn);
                });
                
                qBox.appendChild(optionsGrid);
                quizContainer.appendChild(qBox);
            });
        }

        loadQuiz();
    </script>
</body>
</html>
